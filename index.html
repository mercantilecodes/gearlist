<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercantile Gear Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;padding:20px;font-size:14px}
h1{font-size:20px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:13px;color:#666;margin-bottom:16px}

/* Tab bar */
.tab-bar{display:flex;gap:6px;margin-bottom:16px;align-items:center;border-bottom:1px solid #e8e8e6;padding-bottom:12px;flex-wrap:wrap}
.view-tab{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#888;font-family:inherit}
.view-tab.active{background:#1a1a1a;color:#fff}
.job-tab{padding:7px 14px;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#555;transition:all 0.15s;position:relative}
.job-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.job-tab.archived-tab{opacity:0.6;border-style:dashed}
.add-job-btn{padding:7px 12px;border:1px dashed #ccc;border-radius:8px;font-size:13px;cursor:pointer;background:transparent;color:#aaa;white-space:nowrap}
.add-job-btn:hover{border-color:#999;color:#444}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:#fff;border-radius:8px;padding:10px 14px;border:1px solid #eee}
.stat-label{font-size:11px;color:#888;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px}
.stat-value{font-size:18px;font-weight:500}

/* Job actions bar */
.job-actions{display:flex;gap:8px;margin-bottom:16px;justify-content:flex-end}
.btn-sm{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid #ddd;background:#fff;color:#666}
.btn-sm:hover{background:#f5f5f3}
.btn-sm.danger{color:#c0392b;border-color:#f5c6c6}
.btn-sm.danger:hover{background:#fef5f5}

/* Pack panel */
.pack-panel{background:#fff;border-radius:10px;border:1px solid #e0e0e0;margin-bottom:16px;overflow:hidden}
.pack-panel-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid #f0f0ee;cursor:pointer;user-select:none}
.pack-panel-title{font-size:13px;font-weight:500}
.pack-progress{font-size:12px;color:#aaa}
.pack-col-headers{display:grid;grid-template-columns:1fr 70px 70px;gap:8px;padding:5px 16px 3px;border-bottom:1px solid #f0f0ee}
.pack-col-hdr{font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:0.4px;text-align:center}
.pack-col-hdr:first-child{text-align:left}
.pack-item{display:grid;grid-template-columns:1fr 70px 70px;gap:8px;align-items:center;padding:7px 16px;border-bottom:1px solid #f0f0ee}
.pack-item:last-child{border-bottom:none}
.pack-item.is-returned{background:#f0f9ff}
.pack-item.is-packed{background:#f0fdf4}
.pack-item-name{font-size:13px}
.pack-item-note{font-size:11px;color:#bbb;margin-top:1px}
.cb-cell{display:flex;justify-content:center;align-items:center}
.cb-cell input[type=checkbox]{width:15px;height:15px;cursor:pointer}
.empty-pack{padding:18px;text-align:center;font-size:13px;color:#ccc}

/* Gear sections */
.section{margin-bottom:10px;background:#fff;border-radius:10px;border:1px solid #eee;overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none}
.section-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.section-badge{font-size:11px;color:#888;background:#f0f0ee;padding:2px 8px;border-radius:20px}
.chevron{font-size:11px;color:#aaa;transition:transform 0.2s;display:inline-block}
.chevron.open{transform:rotate(180deg)}
.gear-list{padding:0 0 4px}
.gear-item{display:grid;grid-template-columns:20px 1fr 60px 110px;gap:8px;align-items:center;padding:7px 14px;border-bottom:1px solid #f0f0ee}
.gear-item:last-child{border-bottom:none}
.gear-item.is-selected{background:#fefce8}
.gear-item input[type=checkbox]{width:15px;height:15px;cursor:pointer}
.gear-item label{font-size:13px;cursor:pointer}
.price-display{font-size:12px;color:#bbb;text-align:right;white-space:nowrap}
.price-display.has-custom{color:#888;font-weight:500}
.price-edit-btn{font-size:11px;color:#ccc;cursor:pointer;background:none;border:none;padding:0;font-family:inherit}
.price-edit-btn:hover{color:#888}
.note-input{font-size:12px;color:#888;border:none;background:transparent;width:100%;text-align:right;outline:none;font-family:inherit}
.note-input::placeholder{color:#e8e8e8}
.add-custom-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:12px;color:#aaa;cursor:pointer;border:none;background:none;font-family:inherit;width:100%}
.add-custom-btn:hover{color:#555}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.modal h3{font-size:16px;font-weight:500;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:12px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px}
.modal-field input,.modal-field select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px;font-family:inherit;background:#fff}
.modal-field input:focus,.modal-field select:focus{outline:none;border-color:#999}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-primary{padding:8px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-cancel{padding:8px 18px;background:transparent;border:1px solid #ddd;border-radius:6px;font-size:13px;cursor:pointer;color:#666;font-family:inherit}
.modal-note{font-size:12px;color:#aaa;margin-top:8px}

/* Archive view */
.archive-list{display:flex;flex-direction:column;gap:10px}
.archive-card{background:#fff;border-radius:10px;border:1px solid #eee;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.archive-card-info h4{font-size:14px;font-weight:500}
.archive-card-info p{font-size:12px;color:#aaa;margin-top:2px}
.archive-card-actions{display:flex;gap:6px}
.empty-state{padding:40px;text-align:center;color:#ccc;font-size:13px}

/* Toast */
.saved-toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:7px 14px;border-radius:8px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200}
.saved-toast.show{opacity:1}
</style>
</head>
<body>

<h1>Mercantile Gear Tracker</h1>
<p class="subtitle">Mercantile Images, LLC</p>

<div class="tab-bar">
  <button class="view-tab active" id="tabActive" onclick="switchView('active')">Active</button>
  <button class="view-tab" id="tabArchive" onclick="switchView('archive')">Archive</button>
  <div style="flex:1"></div>
  <div id="jobTabsInner" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"></div>
</div>

<div id="mainContent"></div>
<div class="saved-toast" id="toast">Saved</div>

<!-- New Job Modal -->
<div class="modal-overlay" id="newJobModal">
  <div class="modal">
    <h3>New Job</h3>
    <div class="modal-field"><label>Job Name</label><input type="text" id="njName" placeholder="e.g. NCAR Shoot" /></div>
    <div class="modal-field"><label>Date</label><input type="text" id="njDate" placeholder="e.g. 6/15" /></div>
    <div class="modal-field"><label>Client</label><input type="text" id="njClient" placeholder="Client name" /></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('newJobModal')">Cancel</button>
      <button class="btn-primary" onclick="addJob()">Create Job</button>
    </div>
  </div>
</div>

<!-- Price Edit Modal -->
<div class="modal-overlay" id="priceModal">
  <div class="modal">
    <h3>Set Rental Price</h3>
    <div class="modal-field"><label id="priceModalItem">Item</label><input type="number" id="priceModalVal" placeholder="0" min="0" /></div>
    <p class="modal-note">This overrides the default price for this job only.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('priceModal')">Cancel</button>
      <button class="btn-primary" onclick="savePriceOverride()">Save</button>
    </div>
  </div>
</div>

<!-- Custom Item Modal -->
<div class="modal-overlay" id="customItemModal">
  <div class="modal">
    <h3>Add Custom Item</h3>
    <div class="modal-field"><label>Item Name</label><input type="text" id="ciName" placeholder="e.g. DJI Mavic 3 Pro" /></div>
    <div class="modal-field"><label>Category</label>
      <select id="ciCategory">
        <option>Camera</option><option>Lenses</option><option>Support</option><option>Audio</option>
        <option>Lighting</option><option>Grip</option><option>Video Assist</option><option>Streaming</option>
        <option>Carts & Production</option><option>Vehicle</option><option>Custom</option>
      </select>
    </div>
    <div class="modal-field"><label>Daily Rate ($)</label><input type="number" id="ciPrice" placeholder="0" min="0" /></div>
    <div class="modal-field"><label>Save to</label>
      <select id="ciScope">
        <option value="job">This job only</option>
        <option value="master">Master gear list (all jobs)</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('customItemModal')">Cancel</button>
      <button class="btn-primary" onclick="addCustomItem()">Add Item</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY='mercantile_gear_v2';

const BASE_GEAR={
  Camera:[{n:"Red Raptor 8K VV",p:900},{n:"Canon R5C",p:350},{n:"Canon C500 MKII",p:450},{n:"Sony FX6",p:350},{n:"Sony FX3",p:200}],
  Lenses:[{n:"Laowa Ranger 16-30mm T2.9",p:150},{n:"Laowa Ranger 28-75mm T2.9",p:150},{n:"Laowa Ranger 75-180mm T2.9",p:150},{n:"Canon RF 15-35mm F/2.8",p:75},{n:"Canon RF 28-70mm F/2",p:75},{n:"Canon EF 70-200mm F/2.8",p:75},{n:"Canon EF 35mm F/1.4",p:50},{n:"Canon EF 85mm F/1.4",p:50},{n:"Nikon Vintage 24mm F/2",p:30},{n:"Nikon Vintage 35mm F/2",p:30},{n:"Nikon Vintage 50mm F/1.2",p:30},{n:"Nikon Vintage 85mm F/1.4",p:30}],
  Support:[{n:"CamGear Elite 18 Tripod",p:60},{n:"Sachtler Video 18 Tripod",p:60},{n:"Sachtler Video 17 Tripod",p:50},{n:"Dana Dolly Kit",p:50},{n:"Tripod Dolly",p:25},{n:"DJI Ronin RS3",p:125},{n:"EasyRig Vario 5 + Serene Arm",p:175}],
  Audio:[{n:"Sound Devices Mix Pre 6",p:250},{n:"Rode Wireless Lav",p:0},{n:"Sanken COS 11D Wired Lav",p:0},{n:"Sennheiser MKH 50 Dialog Mic",p:0},{n:"Boom Pole",p:0},{n:"Headphones",p:0}],
  Lighting:[{n:"Aputure 1200X",p:250},{n:"Aputure Storm 400X",p:125},{n:"Aputure 600D",p:105},{n:"Aputure 80C",p:50},{n:"Amaran F21C",p:50},{n:"Amaran F22C + Lantern",p:75},{n:"Aputure B7C (x2)",p:15},{n:"Intellytech Mega 8 RGBWW",p:150},{n:"Pavotubes",p:125}],
  Grip:[{n:"4x4 Butterfly Kit",p:0},{n:"6x6 Butterfly Kit",p:0},{n:"8x8 Butterfly Kit",p:0},{n:"C-Stands (12)",p:0},{n:"Double/Triple Riser Combos",p:0},{n:"Baby Stands (6)",p:0},{n:"Shot Bags 25lb (12)",p:0},{n:"Shot Bags 35lb (8)",p:0},{n:"Apple Box Sets",p:0}],
  "Video Assist":[{n:"Atomos 19M 19in Monitor",p:75},{n:"Flanders DM240 24in Monitor",p:175},{n:"Flanders DM170 17in Monitor",p:75},{n:"SmallHD Cine7 500XT",p:150},{n:"SmallHD Ultra7 7in Monitor",p:125},{n:"Teradek Bolt 6 (1:1)",p:150},{n:"Teradek Bolt 500 XT (1:2)",p:100},{n:"Macbook Pro",p:50},{n:"iPad M1",p:35},{n:"iKan Teleprompter",p:125}],
  Streaming:[{n:"ATEM Mini Pro",p:0},{n:"Camlink 4K",p:150},{n:"Scarlett 4i4",p:0},{n:"SDI/HDMI Converters",p:0},{n:"SDI Cable set",p:0},{n:"HDMI Cable set",p:0},{n:"Hollyland Solidcom (6-pack)",p:150},{n:"vMix PC",p:300}],
  "Carts & Production":[{n:"Magliner Junior Cart",p:0},{n:"Rock n Roller R12",p:0},{n:"Grip House C-Stand Cart",p:0},{n:"Uline Hampers (x2)",p:0},{n:"Folding Tables (x2)",p:0},{n:"Camp Chairs (x6)",p:0},{n:"5ft Step Ladder",p:0},{n:"8ft Step Ladder",p:0}],
  Vehicle:[{n:"2020 Ram Promaster 2500 + Liftgate",p:150}]
};

const DEFAULT_JOBS=[
  {id:1,name:"NCAR Shoot",date:"5/20",client:"invisible.film",archived:false,checked:{},packed:{},returned:{},notes:{},customPrices:{},customItems:[]},
  {id:2,name:"PHC / IMA",date:"6/2-6/3",client:"IMA Corp",archived:false,
    checked:{"Canon C500 MKII":true,"Canon RF 15-35mm F/2.8":true,"Canon RF 28-70mm F/2":true,"Canon EF 70-200mm F/2.8":true,"Canon EF 85mm F/1.4":true,"CamGear Elite 18 Tripod":true,"DJI Ronin RS3":true,"Sound Devices Mix Pre 6":true,"Rode Wireless Lav":true},
    packed:{},returned:{},notes:{"Canon C500 MKII":"IMA has on-site"},customPrices:{},customItems:[]},
  {id:3,name:"Cadence Order",date:"TBD",client:"Cadence",archived:false,
    checked:{"Canon C500 MKII":true,"Laowa Ranger 16-30mm T2.9":true,"Laowa Ranger 28-75mm T2.9":true,"Laowa Ranger 75-180mm T2.9":true,"Sachtler Video 17 Tripod":true,"Dana Dolly Kit":true,"EasyRig Vario 5 + Serene Arm":true,"Atomos 19M 19in Monitor":true,"SmallHD Ultra7 7in Monitor":true,"Teradek Bolt 6 (1:1)":true,"Teradek Bolt 500 XT (1:2)":true,"Hollyland Solidcom (6-pack)":true,"Folding Tables (x2)":true,"Camp Chairs (x6)":true,"SDI Cable set":true,"HDMI Cable set":true},
    packed:{},returned:{},
    notes:{"Canon C500 MKII":"PL mount + card reader?","Laowa Ranger 16-30mm T2.9":"filtration: 1/8, 1/4, pro mist, HBM, polarizer","SDI Cable set":"25ft — confirm","HDMI Cable set":"25ft — confirm","SmallHD Ultra7 7in Monitor":"also wants Shinobi 5in — not in kit","Atomos 19M 19in Monitor":"also wants Odyssey 7Q — not in kit"},
    customPrices:{},customItems:[]}
];

function loadState(){
  try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}
}
function saveState(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({jobs,masterCustom,activeId,nextId,collapsed,packCollapsed,currentView}));showToast();}catch(e){}
}
let toastTimer=null;
function showToast(){
  const t=document.getElementById('toast');t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1400);
}

const saved=loadState();
let jobs=saved?.jobs||JSON.parse(JSON.stringify(DEFAULT_JOBS));
let masterCustom=saved?.masterCustom||{}; // {category:[{n,p}]}
let activeId=saved?.activeId||1;
let nextId=saved?.nextId||4;
let collapsed=saved?.collapsed||{};
let packCollapsed=saved?.packCollapsed||false;
let currentView=saved?.currentView||'active';
let priceModalItem=null;

// Migrate old jobs missing new fields
jobs.forEach(j=>{
  if(!j.customPrices) j.customPrices={};
  if(!j.customItems) j.customItems=[];
  if(j.archived===undefined) j.archived=false;
});

function getGear(){
  // merge base gear with master custom items
  const g=JSON.parse(JSON.stringify(BASE_GEAR));
  for(const [cat,items] of Object.entries(masterCustom)){
    if(!g[cat]) g[cat]=[];
    items.forEach(item=>{if(!g[cat].find(x=>x.n===item.n)) g[cat].push(item);});
  }
  return g;
}

function getEffectivePrice(item,job){
  if(job.customPrices && job.customPrices[item]!==undefined) return job.customPrices[item];
  const all=Object.values(getGear()).flat();
  const found=all.find(g=>g.n===item);
  return found?found.p:0;
}

function getJob(){return jobs.find(j=>j.id===activeId);}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function addJob(){
  const name=document.getElementById('njName').value.trim();
  if(!name)return;
  const job={id:nextId++,name,date:document.getElementById('njDate').value.trim(),client:document.getElementById('njClient').value.trim(),archived:false,checked:{},packed:{},returned:{},notes:{},customPrices:{},customItems:[]};
  jobs.push(job);
  activeId=job.id;
  currentView='active';
  closeModal('newJobModal');
  ['njName','njDate','njClient'].forEach(id=>document.getElementById(id).value='');
  saveState();render();
}

function archiveJob(id){
  const j=jobs.find(j=>j.id===id);if(!j)return;
  j.archived=true;
  const active=jobs.filter(j=>!j.archived);
  activeId=active.length?active[active.length-1].id:null;
  saveState();render();
}

function unarchiveJob(id){
  const j=jobs.find(j=>j.id===id);if(!j)return;
  j.archived=false;activeId=id;currentView='active';
  saveState();render();
}

function deleteJob(id){
  if(!confirm('Permanently delete this job?'))return;
  jobs=jobs.filter(j=>j.id!==id);
  saveState();render();
}

function switchJob(id){activeId=id;saveState();render();}
function switchView(v){currentView=v;saveState();render();}

function toggleCheck(item){
  const j=getJob();j.checked[item]=!j.checked[item];
  if(!j.checked[item]){j.packed[item]=false;j.returned[item]=false;}
  saveState();render();
}
function togglePacked(item){const j=getJob();j.packed[item]=!j.packed[item];saveState();render();}
function toggleReturned(item){const j=getJob();j.returned[item]=!j.returned[item];saveState();render();}
function setNote(item,val){getJob().notes[item]=val;saveState();}
function toggleSec(sec){collapsed[sec]=!collapsed[sec];saveState();render();}
function togglePack(){packCollapsed=!packCollapsed;saveState();render();}

function openPriceModal(item){
  priceModalItem=item;
  const job=getJob();
  document.getElementById('priceModalItem').textContent=item;
  const cur=job.customPrices[item]!==undefined?job.customPrices[item]:getEffectivePrice(item,{customPrices:{}});
  document.getElementById('priceModalVal').value=cur||'';
  openModal('priceModal');
}
function savePriceOverride(){
  if(!priceModalItem)return;
  const val=parseFloat(document.getElementById('priceModalVal').value)||0;
  getJob().customPrices[priceModalItem]=val;
  closeModal('priceModal');saveState();render();
}

function openCustomItemModal(){openModal('customItemModal');}
function addCustomItem(){
  const name=document.getElementById('ciName').value.trim();
  if(!name)return;
  const cat=document.getElementById('ciCategory').value;
  const price=parseFloat(document.getElementById('ciPrice').value)||0;
  const scope=document.getElementById('ciScope').value;
  const item={n:name,p:price};

  if(scope==='master'){
    if(!masterCustom[cat]) masterCustom[cat]=[];
    if(!masterCustom[cat].find(x=>x.n===name)) masterCustom[cat].push(item);
    // Also select on current job
    const j=getJob();if(j){j.checked[name]=true;}
  } else {
    const j=getJob();
    if(j){
      if(!j.customItems) j.customItems=[];
      if(!j.customItems.find(x=>x.n===name)) j.customItems.push({...item,cat});
      j.checked[name]=true;
    }
  }
  closeModal('customItemModal');
  ['ciName','ciPrice'].forEach(id=>document.getElementById(id).value='');
  saveState();render();
}

function render(){
  // View tabs
  document.getElementById('tabActive').classList.toggle('active',currentView==='active');
  document.getElementById('tabArchive').classList.toggle('active',currentView==='archive');

  const activeJobs=jobs.filter(j=>!j.archived);
  const archivedJobs=jobs.filter(j=>j.archived);

  // Job tabs (active view only)
  const tabsEl=document.getElementById('jobTabsInner');
  if(currentView==='active'){
    tabsEl.style.display='flex';
    tabsEl.innerHTML=activeJobs.map(j=>`<button class="job-tab${j.id===activeId?' active':''}" onclick="switchJob(${j.id})">${j.name}${j.date?` <span style="opacity:0.5;font-size:11px">${j.date}</span>`:''}</button>`).join('')+
      `<button class="add-job-btn" onclick="openModal('newJobModal')">+ New job</button>`;
  } else {
    tabsEl.style.display='none';
  }

  const content=document.getElementById('mainContent');

  if(currentView==='archive'){
    if(!archivedJobs.length){
      content.innerHTML=`<div class="empty-state">No archived jobs yet.<br>Archive a job from the active view to see it here.</div>`;
    } else {
      content.innerHTML=`<div class="archive-list">`+archivedJobs.map(j=>{
        const cnt=Object.values(j.checked).filter(Boolean).length;
        return `<div class="archive-card">
          <div class="archive-card-info">
            <h4>${j.name}</h4>
            <p>${[j.client,j.date,cnt+' items'].filter(Boolean).join(' · ')}</p>
          </div>
          <div class="archive-card-actions">
            <button class="btn-sm" onclick="unarchiveJob(${j.id})">Restore</button>
            <button class="btn-sm danger" onclick="deleteJob(${j.id})">Delete</button>
          </div>
        </div>`;
      }).join('')+`</div>`;
    }
    return;
  }

  // Active view
  const job=getJob();
  if(!job){content.innerHTML=`<div class="empty-state">No active jobs. Create one to get started.</div>`;return;}

  const gear=getGear();
  // Merge job-only custom items into a working gear map
  const jobGear=JSON.parse(JSON.stringify(gear));
  (job.customItems||[]).forEach(ci=>{
    const cat=ci.cat||'Custom';
    if(!jobGear[cat]) jobGear[cat]=[];
    if(!jobGear[cat].find(x=>x.n===ci.n)) jobGear[cat].push({n:ci.n,p:ci.p});
  });

  const selectedItems=Object.entries(job.checked).filter(([,v])=>v).map(([k])=>k);
  const packedCnt=selectedItems.filter(k=>job.packed[k]).length;
  const returnedCnt=selectedItems.filter(k=>job.returned[k]).length;
  const total=selectedItems.reduce((s,k)=>s+getEffectivePrice(k,job),0);

  let html=`<div class="stats">
    <div class="stat"><div class="stat-label">On this job</div><div class="stat-value">${selectedItems.length}</div></div>
    <div class="stat"><div class="stat-label">Packed</div><div class="stat-value">${packedCnt}</div></div>
    <div class="stat"><div class="stat-label">Returned</div><div class="stat-value">${returnedCnt}</div></div>
    <div class="stat"><div class="stat-label">Total rental</div><div class="stat-value">$${total.toLocaleString()}</div></div>
  </div>
  <div class="job-actions">
    <button class="btn-sm" onclick="archiveJob(${job.id})">Archive job</button>
  </div>`;

  // Pack panel
  html+=`<div class="pack-panel">
    <div class="pack-panel-header" onclick="togglePack()">
      <div class="pack-panel-title">Pack list</div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="pack-progress">${packedCnt}/${selectedItems.length} packed &nbsp;·&nbsp; ${returnedCnt}/${selectedItems.length} returned</span>
        <span class="chevron${packCollapsed?'':' open'}">&#9660;</span>
      </div>
    </div>`;
  if(!packCollapsed){
    if(!selectedItems.length){
      html+=`<div class="empty-pack">No gear selected — check items below to build your pack list</div>`;
    } else {
      html+=`<div class="pack-col-headers"><span class="pack-col-hdr">Item</span><span class="pack-col-hdr">Packed</span><span class="pack-col-hdr">Returned</span></div>`;
      for(const item of selectedItems){
        const pkd=job.packed[item]||false,ret=job.returned[item]||false,note=job.notes[item]||'';
        let cls='pack-item';if(ret)cls+=' is-returned';else if(pkd)cls+=' is-packed';
        html+=`<div class="${cls}">
          <div><div class="pack-item-name">${item}</div>${note?`<div class="pack-item-note">${note}</div>`:''}</div>
          <div class="cb-cell"><input type="checkbox" ${pkd?'checked':''} onchange="togglePacked('${item.replace(/'/g,"\\'")}')"></div>
          <div class="cb-cell"><input type="checkbox" ${ret?'checked':''} onchange="toggleReturned('${item.replace(/'/g,"\\'")}')"></div>
        </div>`;
      }
    }
  }
  html+=`</div>`;

  // Gear sections
  for(const [sec,items] of Object.entries(jobGear)){
    const sc=items.filter(g=>job.checked[g.n]).length;
    const secTotal=items.filter(g=>job.checked[g.n]).reduce((s,g)=>s+getEffectivePrice(g.n,job),0);
    const open=!collapsed[sec];
    html+=`<div class="section">
      <div class="section-header" onclick="toggleSec('${sec.replace(/'/g,"\\'")}')">
        <div class="section-title">${sec}${sc>0?` <span class="section-badge">${sc}</span>`:''}</div>
        <div style="display:flex;align-items:center;gap:10px">
          ${secTotal>0?`<span style="font-size:12px;color:#bbb">$${secTotal.toLocaleString()}</span>`:''}
          <span class="chevron${open?' open':''}">&#9660;</span>
        </div>
      </div>`;
    if(open){
      html+=`<div class="gear-list">`;
      for(const gear of items){
        const item=gear.n,chk=job.checked[item]||false;
        const note=(job.notes[item]||'').replace(/"/g,'&quot;');
        const effPrice=getEffectivePrice(item,job);
        const hasCustomPrice=job.customPrices[item]!==undefined;
        const cid='c_'+item.replace(/\W/g,'_');
        html+=`<div class="gear-item${chk?' is-selected':''}">
          <input type="checkbox" id="${cid}" ${chk?'checked':''} onchange="toggleCheck('${item.replace(/'/g,"\\'")}')">
          <label for="${cid}">${item}</label>
          <div style="text-align:right">
            <span class="price-display${hasCustomPrice?' has-custom':''}" onclick="openPriceModal('${item.replace(/'/g,"\\'")}')">
              ${effPrice>0?`$${effPrice}`:`<span style="color:#ddd">$—</span>`}
            </span>
          </div>
          <input class="note-input" type="text" placeholder="note..." value="${note}" onchange="setNote('${item.replace(/'/g,"\\'")}',this.value)">
        </div>`;
      }
      html+=`<button class="add-custom-btn" onclick="openCustomItemModal()">+ Add item to ${sec}</button>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  }

  content.innerHTML=html;
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});

// Enter key in modals
document.getElementById('njName').addEventListener('keydown',e=>{if(e.key==='Enter')addJob();});
document.getElementById('priceModalVal').addEventListener('keydown',e=>{if(e.key==='Enter')savePriceOverride();});
document.getElementById('ciName').addEventListener('keydown',e=>{if(e.key==='Enter')addCustomItem();});

render();
</script>
</body>
</html>
