<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercantile Gear Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;padding:24px;font-size:14px}
h1{font-size:20px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:13px;color:#666;margin-bottom:20px}
.job-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.job-tab{padding:8px 16px;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#555;transition:all 0.15s}
.job-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.add-job-btn{padding:8px 14px;border:1px dashed #ccc;border-radius:8px;font-size:13px;cursor:pointer;background:transparent;color:#888}
.add-job-btn:hover{border-color:#999;color:#444}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:#fff;border-radius:8px;padding:12px 16px;border:1px solid #eee}
.stat-label{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.stat-value{font-size:18px;font-weight:500}
.pack-panel{background:#fff;border-radius:10px;border:1px solid #e0e0e0;margin-bottom:20px;overflow:hidden}
.pack-panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f0f0ee;cursor:pointer;user-select:none}
.pack-panel-title{font-size:13px;font-weight:500}
.pack-progress{font-size:12px;color:#aaa}
.pack-col-headers{display:grid;grid-template-columns:1fr 70px 70px;gap:8px;padding:6px 16px 4px;border-bottom:1px solid #f0f0ee}
.pack-col-hdr{font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:0.4px;text-align:center}
.pack-col-hdr:first-child{text-align:left}
.pack-item{display:grid;grid-template-columns:1fr 70px 70px;gap:8px;align-items:center;padding:8px 16px;border-bottom:1px solid #f0f0ee}
.pack-item:last-child{border-bottom:none}
.pack-item.is-returned{background:#f0f9ff}
.pack-item.is-packed{background:#f0fdf4}
.pack-item-name{font-size:13px}
.pack-item-note{font-size:11px;color:#bbb;margin-top:2px}
.cb-cell{display:flex;justify-content:center;align-items:center}
.cb-cell input[type=checkbox]{width:15px;height:15px;cursor:pointer}
.empty-pack{padding:20px;text-align:center;font-size:13px;color:#ccc}
.section{margin-bottom:10px;background:#fff;border-radius:10px;border:1px solid #eee;overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none}
.section-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.section-badge{font-size:11px;color:#888;background:#f0f0ee;padding:2px 8px;border-radius:20px}
.chevron{font-size:12px;color:#aaa;transition:transform 0.2s;display:inline-block}
.chevron.open{transform:rotate(180deg)}
.gear-list{padding:0 0 4px}
.gear-item{display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid #f0f0ee}
.gear-item:last-child{border-bottom:none}
.gear-item.is-selected{background:#fefce8}
.gear-item label{font-size:13px;cursor:pointer;flex:1}
.gear-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;flex-shrink:0}
.gear-price{font-size:11px;color:#ccc}
.note-input{font-size:12px;color:#888;border:none;background:transparent;width:110px;text-align:right;outline:none;font-family:inherit}
.note-input::placeholder{color:#e0e0e0}
.new-job-form{background:#fff;border-radius:10px;border:1px solid #eee;padding:16px;margin-bottom:20px;display:none}
.new-job-form.visible{display:block}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.form-row input,.form-row select{flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;background:#fff}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.btn-primary{padding:7px 16px;background:#1a1a1a;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer}
.btn-cancel{padding:7px 16px;background:transparent;border:1px solid #ddd;border-radius:6px;font-size:13px;cursor:pointer;color:#666}
.saved-toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none}
.saved-toast.show{opacity:1}
</style>
</head>
<body>

<h1>Mercantile Gear Tracker</h1>
<p class="subtitle">Select a job, check gear to add to the pack list</p>

<div class="job-tabs" id="jobTabs"></div>

<div class="new-job-form" id="newJobForm">
  <div class="form-row">
    <input type="text" id="newJobName" placeholder="Job name" />
    <input type="text" id="newJobDate" placeholder="Date" />
  </div>
  <div class="form-row">
    <input type="text" id="newJobClient" placeholder="Client" />
    <select id="newJobStatus">
      <option value="upcoming">Upcoming</option>
      <option value="active">Active</option>
    </select>
  </div>
  <div class="form-actions">
    <button class="btn-cancel" onclick="toggleForm()">Cancel</button>
    <button class="btn-primary" onclick="addJob()">Add job</button>
  </div>
</div>

<div class="stats" id="stats"></div>
<div id="packPanel"></div>
<div id="jobContent"></div>
<div class="saved-toast" id="toast">Saved</div>

<script>
const STORAGE_KEY='mercantile_gear_tracker_v1';

const GEAR={
  Camera:[{n:"Red Raptor 8K VV",p:900},{n:"Canon R5C",p:350},{n:"Canon C500 MKII",p:450},{n:"Sony FX6",p:350},{n:"Sony FX3",p:200}],
  Lenses:[{n:"Laowa Ranger 16-30mm T2.9",p:150},{n:"Laowa Ranger 28-75mm T2.9",p:150},{n:"Laowa Ranger 75-180mm T2.9",p:150},{n:"Canon RF 15-35mm F/2.8",p:75},{n:"Canon RF 28-70mm F/2",p:75},{n:"Canon EF 70-200mm F/2.8",p:75},{n:"Canon EF 35mm F/1.4",p:50},{n:"Canon EF 85mm F/1.4",p:50},{n:"Nikon Vintage 24mm F/2",p:30},{n:"Nikon Vintage 35mm F/2",p:30},{n:"Nikon Vintage 50mm F/1.2",p:30},{n:"Nikon Vintage 85mm F/1.4",p:30}],
  Support:[{n:"CamGear Elite 18 Tripod",p:60},{n:"Sachtler Video 18 Tripod",p:60},{n:"Sachtler Video 17 Tripod",p:50},{n:"Dana Dolly Kit",p:50},{n:"Tripod Dolly",p:25},{n:"DJI Ronin RS3",p:125},{n:"EasyRig Vario 5 + Serene Arm",p:175}],
  Audio:[{n:"Sound Devices Mix Pre 6",p:250},{n:"Rode Wireless Lav",p:0},{n:"Sanken COS 11D Wired Lav",p:0},{n:"Sennheiser MKH 50 Dialog Mic",p:0},{n:"Boom Pole",p:0},{n:"Headphones",p:0}],
  Lighting:[{n:"Aputure 1200X",p:250},{n:"Aputure Storm 400X",p:125},{n:"Aputure 600D",p:105},{n:"Aputure 80C",p:50},{n:"Amaran F21C",p:50},{n:"Amaran F22C + Lantern",p:75},{n:"Aputure B7C (x2)",p:15},{n:"Intellytech Mega 8 RGBWW",p:150},{n:"Pavotubes",p:125}],
  Grip:[{n:"4x4 Butterfly Kit",p:0},{n:"6x6 Butterfly Kit",p:0},{n:"8x8 Butterfly Kit",p:0},{n:"C-Stands (12)",p:0},{n:"Double/Triple Riser Combos",p:0},{n:"Baby Stands (6)",p:0},{n:"Shot Bags 25lb (12)",p:0},{n:"Shot Bags 35lb (8)",p:0},{n:"Apple Box Sets",p:0}],
  "Video Assist":[{n:"Atomos 19M 19in Monitor",p:75},{n:"Flanders DM240 24in Monitor",p:175},{n:"Flanders DM170 17in Monitor",p:75},{n:"SmallHD Cine7 500XT",p:150},{n:"SmallHD Ultra7 7in Monitor",p:125},{n:"Teradek Bolt 6 (1:1)",p:150},{n:"Teradek Bolt 500 XT (1:2)",p:100},{n:"Macbook Pro",p:50},{n:"iPad M1",p:35},{n:"iKan Teleprompter",p:125}],
  Streaming:[{n:"ATEM Mini Pro",p:0},{n:"Camlink 4K",p:150},{n:"Scarlett 4i4",p:0},{n:"SDI/HDMI Converters",p:0},{n:"SDI Cable set",p:0},{n:"HDMI Cable set",p:0},{n:"Hollyland Solidcom (6-pack)",p:150},{n:"vMix PC",p:300}],
  "Carts & Production":[{n:"Magliner Junior Cart",p:0},{n:"Rock n Roller R12",p:0},{n:"Grip House C-Stand Cart",p:0},{n:"Uline Hampers (x2)",p:0},{n:"Folding Tables (x2)",p:0},{n:"Camp Chairs (x6)",p:0},{n:"5ft Step Ladder",p:0},{n:"8ft Step Ladder",p:0}],
  Vehicle:[{n:"2020 Ram Promaster 2500 + Liftgate",p:150}]
};

const PRICE_MAP={};
Object.values(GEAR).flat().forEach(g=>PRICE_MAP[g.n]=g.p);

const DEFAULT_JOBS=[
  {id:1,name:"NCAR Shoot",date:"5/20",client:"invisible.film",status:"upcoming",checked:{},packed:{},returned:{},notes:{}},
  {id:2,name:"PHC / IMA",date:"6/2-6/3",client:"IMA Corp",status:"upcoming",
    checked:{"Canon C500 MKII":true,"Canon RF 15-35mm F/2.8":true,"Canon RF 28-70mm F/2":true,"Canon EF 70-200mm F/2.8":true,"Canon EF 85mm F/1.4":true,"CamGear Elite 18 Tripod":true,"DJI Ronin RS3":true,"Sound Devices Mix Pre 6":true,"Rode Wireless Lav":true},
    packed:{},returned:{},notes:{"Canon C500 MKII":"IMA has on-site"}},
  {id:3,name:"Cadence Order",date:"TBD",client:"Cadence",status:"upcoming",
    checked:{"Canon C500 MKII":true,"Laowa Ranger 16-30mm T2.9":true,"Laowa Ranger 28-75mm T2.9":true,"Laowa Ranger 75-180mm T2.9":true,"Sachtler Video 17 Tripod":true,"Dana Dolly Kit":true,"EasyRig Vario 5 + Serene Arm":true,"Atomos 19M 19in Monitor":true,"SmallHD Ultra7 7in Monitor":true,"Teradek Bolt 6 (1:1)":true,"Teradek Bolt 500 XT (1:2)":true,"Hollyland Solidcom (6-pack)":true,"Folding Tables (x2)":true,"Camp Chairs (x6)":true,"SDI Cable set":true,"HDMI Cable set":true},
    packed:{},returned:{},
    notes:{"Canon C500 MKII":"PL mount + card reader?","Laowa Ranger 16-30mm T2.9":"filtration: 1/8, 1/4, pro mist, HBM, polarizer","SDI Cable set":"25ft — confirm length","HDMI Cable set":"25ft — confirm length","SmallHD Ultra7 7in Monitor":"also requested Shinobi 5in — not in kit","Atomos 19M 19in Monitor":"also requested Odyssey 7Q — not in kit"}}
];

function loadState(){
  try {
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  } catch(e){ return null; }
}

function saveState(){
  try {
    localStorage.setItem(STORAGE_KEY,JSON.stringify({jobs,activeId,nextId,collapsed,packCollapsed}));
    showToast();
  } catch(e){}
}

let toastTimer=null;
function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1500);
}

const saved=loadState();
let jobs=saved?.jobs||JSON.parse(JSON.stringify(DEFAULT_JOBS));
let activeId=saved?.activeId||1;
let nextId=saved?.nextId||4;
let collapsed=saved?.collapsed||{};
let packCollapsed=saved?.packCollapsed||false;
let showForm=false;

function toggleForm(){showForm=!showForm;document.getElementById('newJobForm').classList.toggle('visible',showForm);}

function addJob(){
  const name=document.getElementById('newJobName').value.trim();
  if(!name)return;
  jobs.push({id:nextId++,name,date:document.getElementById('newJobDate').value.trim(),client:document.getElementById('newJobClient').value.trim(),status:document.getElementById('newJobStatus').value,checked:{},packed:{},returned:{},notes:{}});
  activeId=jobs[jobs.length-1].id;
  showForm=false;
  document.getElementById('newJobForm').classList.remove('visible');
  ['newJobName','newJobDate','newJobClient'].forEach(id=>document.getElementById(id).value='');
  saveState();
  render();
}

function getJob(){return jobs.find(j=>j.id===activeId);}

function toggleCheck(item){
  const j=getJob();j.checked[item]=!j.checked[item];
  if(!j.checked[item]){j.packed[item]=false;j.returned[item]=false;}
  saveState();render();
}
function togglePacked(item){const j=getJob();j.packed[item]=!j.packed[item];saveState();render();}
function toggleReturned(item){const j=getJob();j.returned[item]=!j.returned[item];saveState();render();}
function setNote(item,val){getJob().notes[item]=val;saveState();}
function toggleSec(sec){collapsed[sec]=!collapsed[sec];saveState();render();}
function togglePack(){packCollapsed=!packCollapsed;saveState();render();}
function switchJob(id){activeId=id;saveState();render();}

function render(){
  document.getElementById('jobTabs').innerHTML=
    jobs.map(j=>`<button class="job-tab${j.id===activeId?' active':''}" onclick="switchJob(${j.id})">${j.name} <span style="opacity:0.6;font-size:11px">${j.date}</span></button>`).join('')+
    `<button class="add-job-btn" onclick="toggleForm()">+ New job</button>`;

  const job=getJob();
  if(!job)return;

  const selectedItems=Object.entries(job.checked).filter(([,v])=>v).map(([k])=>k);
  const packedCnt=selectedItems.filter(k=>job.packed[k]).length;
  const returnedCnt=selectedItems.filter(k=>job.returned[k]).length;
  const total=selectedItems.reduce((s,k)=>s+(PRICE_MAP[k]||0),0);

  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">On this job</div><div class="stat-value">${selectedItems.length}</div></div>
    <div class="stat"><div class="stat-label">Packed</div><div class="stat-value">${packedCnt}</div></div>
    <div class="stat"><div class="stat-label">Returned</div><div class="stat-value">${returnedCnt}</div></div>
    <div class="stat"><div class="stat-label">Total rental</div><div class="stat-value">$${total.toLocaleString()}</div></div>`;

  let packHtml=`<div class="pack-panel">
    <div class="pack-panel-header" onclick="togglePack()">
      <div class="pack-panel-title">Pack list</div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="pack-progress">${packedCnt}/${selectedItems.length} packed &nbsp;·&nbsp; ${returnedCnt}/${selectedItems.length} returned</span>
        <span class="chevron${packCollapsed?'':' open'}">&#9660;</span>
      </div>
    </div>`;
  if(!packCollapsed){
    if(selectedItems.length===0){
      packHtml+=`<div class="empty-pack">No gear selected — check items below to build your pack list</div>`;
    } else {
      packHtml+=`<div class="pack-col-headers"><span class="pack-col-hdr">Item</span><span class="pack-col-hdr">Packed</span><span class="pack-col-hdr">Returned</span></div>`;
      for(const item of selectedItems){
        const pkd=job.packed[item]||false;
        const ret=job.returned[item]||false;
        const note=job.notes[item]||'';
        let cls='pack-item';
        if(ret) cls+=' is-returned';
        else if(pkd) cls+=' is-packed';
        packHtml+=`<div class="${cls}">
          <div>
            <div class="pack-item-name">${item}</div>
            ${note?`<div class="pack-item-note">${note}</div>`:''}
          </div>
          <div class="cb-cell"><input type="checkbox" ${pkd?'checked':''} onchange="togglePacked('${item.replace(/'/g,"\\'")}')"></div>
          <div class="cb-cell"><input type="checkbox" ${ret?'checked':''} onchange="toggleReturned('${item.replace(/'/g,"\\'")}')"></div>
        </div>`;
      }
    }
  }
  packHtml+=`</div>`;
  document.getElementById('packPanel').innerHTML=packHtml;

  let html='';
  for(const [sec,items] of Object.entries(GEAR)){
    const sc=items.filter(g=>job.checked[g.n]).length;
    const secTotal=items.filter(g=>job.checked[g.n]).reduce((s,g)=>s+g.p,0);
    const open=!collapsed[sec];
    html+=`<div class="section">
      <div class="section-header" onclick="toggleSec('${sec}')">
        <div class="section-title">${sec}${sc>0?` <span class="section-badge">${sc}</span>`:''}</div>
        <div style="display:flex;align-items:center;gap:12px">
          ${secTotal>0?`<span style="font-size:12px;color:#bbb">$${secTotal.toLocaleString()}</span>`:''}
          <span class="chevron${open?' open':''}">&#9660;</span>
        </div>
      </div>`;
    if(open){
      html+=`<div class="gear-list">`;
      for(const gear of items){
        const item=gear.n;
        const chk=job.checked[item]||false;
        const note=(job.notes[item]||'').replace(/"/g,'&quot;');
        const cid='c_'+item.replace(/\W/g,'_');
        html+=`<div class="gear-item${chk?' is-selected':''}">
          <input type="checkbox" id="${cid}" ${chk?'checked':''} onchange="toggleCheck('${item.replace(/'/g,"\\'")}')">
          <label for="${cid}">${item}${gear.p>0?` <span class="gear-price">$${gear.p}</span>`:''}</label>
          <input class="note-input" type="text" placeholder="note..." value="${note}" onchange="setNote('${item.replace(/'/g,"\\'")}',this.value)">
        </div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  document.getElementById('jobContent').innerHTML=html;
}
render();
</script>
</body>
</html>
